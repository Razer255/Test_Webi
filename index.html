<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YouTube Live Giveaway</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #FF0033;
    --red-dark: #cc0027;
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --dark4: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --green: #00e676;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; }
  body {
    min-height: 100vh;
    background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,0,51,0.12) 0%, transparent 70%);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 40px 0;
  }
  .yt-logo { display: flex; align-items: center; gap: 10px; }
  .yt-icon {
    width: 36px; height: 36px; background: var(--red);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .yt-icon svg { width: 20px; height: 20px; fill: white; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em; color: white; }

  .live-badge {
    display: none;
    align-items: center;
    gap: 7px;
    background: rgba(255,0,51,0.12);
    border: 1px solid rgba(255,0,51,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--red);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .live-badge.show { display: flex; }
  .live-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .connect-row { display: flex; gap: 10px; }
  .connect-row input {
    flex: 1;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .connect-row input:focus { border-color: rgba(255,0,51,0.5); }
  .connect-row input::placeholder { color: var(--muted); }

  .btn {
    background: var(--red);
    border: none;
    border-radius: 10px;
    padding: 11px 24px;
    color: white;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--red-dark); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-ghost:hover { background: var(--dark3); color: var(--text); }

  .status-bar {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
  }
  .status-bar.ok  { color: var(--green); }
  .status-bar.err { color: #ff6b6b; }

  .viewer-stats { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat {
    flex: 1;
    background: var(--dark3);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: white; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .viewer-list {
    background: var(--dark3);
    border-radius: 10px;
    height: 260px;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .viewer-list::-webkit-scrollbar { width: 4px; }
  .viewer-list::-webkit-scrollbar-thumb { background: var(--dark4); border-radius: 4px; }
  .viewer-empty { color: var(--muted); font-size: 13px; text-align: center; padding-top: 60px; }

  .viewer-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 7px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text);
    animation: fadeIn 0.25s ease both;
  }
  .viewer-item:hover { background: var(--dark4); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  .msg-count { font-size: 11px; color: var(--muted); }

  .ticker-stage {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 20px;
    margin: 0 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 130px;
  }
  .ticker-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .ticker-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px;
    letter-spacing: 0.05em;
    color: white;
    line-height: 1;
    min-height: 64px;
    text-align: center;
    word-break: break-all;
  }
  .ticker-name.rolling { color: var(--muted); }
  .ticker-name.winner  { color: var(--red); animation: pop 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both; }
  @keyframes pop {
    0%   { transform: scale(0.75); opacity: 0; }
    60%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .draw-btn-wrap { display: flex; gap: 12px; }
  .draw-btn-wrap .btn      { flex: 1; padding: 15px; font-size: 16px; }
  .draw-btn-wrap .btn-ghost { padding: 15px 20px; }

  #confetti-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 9999; display: none;
  }

  @media (max-width: 600px) {
    header { padding: 20px 20px 0; }
    main   { padding: 20px 16px 40px; }
    .ticker-name { font-size: 44px; }
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header>
  <div class="yt-logo">
    <div class="yt-icon">
      <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
    </div>
    <h1>Live Giveaway</h1>
  </div>
  <div class="live-badge" id="live-badge">
    <div class="live-dot"></div>
    Live
  </div>
</header>

<main>

  <!-- Connect -->
  <div class="card">
    <div class="card-label">Connect to Stream</div>
    <div class="connect-row">
      <input id="video-id" type="text" placeholder="Paste YouTube Video ID here..." autocomplete="off"/>
      <button class="btn" id="connect-btn" onclick="connectLive()">Connect</button>
      <button class="btn-ghost" id="stop-btn" onclick="stopFetching()" style="display:none">Disconnect</button>
    </div>
    <div class="status-bar" id="status">Paste your Video ID and hit Connect.</div>
  </div>

  <!-- Viewers -->
  <div class="card">
    <div class="card-label">Live Chat Viewers</div>
    <div class="viewer-stats">
      <div class="stat">
        <div class="stat-num" id="count-total">0</div>
        <div class="stat-lbl">Unique viewers</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="count-msgs">0</div>
        <div class="stat-lbl">Total messages</div>
      </div>
    </div>
    <div class="viewer-list" id="viewer-list">
      <div class="viewer-empty">Connect to see live viewers</div>
    </div>
  </div>

  <!-- Draw -->
  <div class="card">
    <div class="card-label">Pick a Winner</div>
    <div class="ticker-stage">
      <div class="ticker-label" id="ticker-label">Ready to draw</div>
      <div class="ticker-name" id="ticker-name">—</div>
    </div>
    <div class="draw-btn-wrap">
      <button class="btn" id="draw-btn" onclick="startDraw()">🎲 Draw Winner</button>
      <button class="btn-ghost" id="reset-btn" onclick="resetDraw()" style="display:none">Reset</button>
    </div>
  </div>

</main>

<script>
  // ══ =═════════════════════════════════════════════
  //   🔒 YOUR PRIVATE CONFIG — EDIT ONLY THIS PART
  // ═══════════════════════════════════════════════
  const API_KEY       = "AIzaSyA7TGIFuskwrOwi4s8v5NwVonrbDN96-A4";
  const SECRET_WINNER = "@shashwat887";
  // ═══════════════════════════════════════════════

  let viewers    = {};
  let liveChatId = '';
  let pageToken  = '';
  let fetchTimer = null;
  let totalMsgs  = 0;
  let isDrawing  = false;

  const COLORS = ['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#4dabf7','#cc5de8','#f783ac','#63e6be'];
  function pickColor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
    return COLORS[h];
  }
  function initials(n) { return n.slice(0,2).toUpperCase(); }

  async function connectLive() {
    const videoId = document.getElementById('video-id').value.trim();
    if (!videoId) { setStatus('Please paste a Video ID.', 'err'); return; }
    if (!API_KEY || API_KEY === 'PASTE_YOUR_API_KEY_HERE') {
      setStatus('API key not set in the code. Edit the config section.', 'err'); return;
    }
    setStatus('Connecting…', '');
    try {
      const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`);
      const d = await r.json();
      if (d.error) { setStatus('API error: ' + d.error.message, 'err'); return; }
      const item = d.items?.[0];
      if (!item?.liveStreamingDetails) { setStatus('No live stream found for this Video ID.', 'err'); return; }
      liveChatId = item.liveStreamingDetails.activeLiveChatId;
      if (!liveChatId) { setStatus('Stream is not live or chat is disabled.', 'err'); return; }
      setStatus('Connected! Loading viewers…', 'ok');
      document.getElementById('live-badge').classList.add('show');
      document.getElementById('connect-btn').style.display = 'none';
      document.getElementById('stop-btn').style.display = '';
      fetchChat();
    } catch(e) {
      setStatus('Network error: ' + e.message, 'err');
    }
  }

  async function fetchChat() {
    if (!liveChatId) return;
    let url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&maxResults=200&key=${API_KEY}`;
    if (pageToken) url += `&pageToken=${pageToken}`;
    try {
      const r = await fetch(url);
      const d = await r.json();
      if (d.error) { setStatus('Error: ' + d.error.message, 'err'); return; }
      pageToken = d.nextPageToken || '';
      (d.items || []).forEach(item => {
        const name = item.authorDetails.displayName;
        totalMsgs++;
        if (!viewers[name]) viewers[name] = { color: pickColor(name), msgs: 0 };
        viewers[name].msgs++;
      });
      renderViewers();
      setStatus(`Live · ${Object.keys(viewers).length} unique viewers`, 'ok');
      fetchTimer = setTimeout(fetchChat, d.pollingIntervalMillis || 5000);
    } catch(e) {
      setStatus('Reconnecting…', 'err');
      fetchTimer = setTimeout(fetchChat, 8000);
    }
  }

  function stopFetching() {
    clearTimeout(fetchTimer);
    liveChatId = '';
    document.getElementById('live-badge').classList.remove('show');
    document.getElementById('connect-btn').style.display = '';
    document.getElementById('stop-btn').style.display = 'none';
    setStatus('Disconnected. Viewer pool preserved.', '');
  }

  function renderViewers() {
    document.getElementById('count-total').textContent = Object.keys(viewers).length;
    document.getElementById('count-msgs').textContent  = totalMsgs;
    const list = document.getElementById('viewer-list');
    list.innerHTML = '';
    [...Object.entries(viewers)]
      .sort((a,b) => b[1].msgs - a[1].msgs)
      .slice(0, 100)
      .forEach(([name, info]) => {
        const div = document.createElement('div');
        div.className = 'viewer-item';
        div.innerHTML = `
          <div class="avatar" style="background:${info.color}22;color:${info.color}">${initials(name)}</div>
          <span style="flex:1">${esc(name)}</span>
          <span class="msg-count">${info.msgs}</span>
        `;
        list.appendChild(div);
      });
  }

  function startDraw() {
    if (isDrawing) return;
    const pool = Object.keys(viewers);
    if (pool.length < 2) { alert('Need at least 2 viewers in the pool first.'); return; }
    if (!SECRET_WINNER || SECRET_WINNER === 'PASTE_WINNER_USERNAME_HERE') {
      alert('Set the SECRET_WINNER in the code first.'); return;
    }
    if (!viewers[SECRET_WINNER]) {
      viewers[SECRET_WINNER] = { color: pickColor(SECRET_WINNER), msgs: 1 };
      renderViewers();
    }
    isDrawing = true;
    document.getElementById('draw-btn').disabled = true;
    document.getElementById('reset-btn').style.display = 'none';

    const ticker = document.getElementById('ticker-name');
    ticker.className   = 'ticker-name rolling';
    ticker.textContent = '...';
    document.getElementById('ticker-label').textContent = 'Drawing…';

    const others  = Object.keys(viewers).filter(n => n !== SECRET_WINNER);
    const totalMs = 4000;
    let elapsed   = 0;
    let interval  = 50;

    function step() {
      const progress = elapsed / totalMs;
      interval = 50 + (340 - 50) * Math.pow(progress, 2.3);
      if (elapsed < totalMs * 0.87) {
        ticker.textContent = others[Math.floor(Math.random() * others.length)];
      } else if (elapsed < totalMs) {
        ticker.textContent = Math.random() > 0.42 ? SECRET_WINNER : others[Math.floor(Math.random() * others.length)];
      } else {
        ticker.textContent = SECRET_WINNER;
        ticker.className   = 'ticker-name winner';
        document.getElementById('ticker-label').textContent = '🏆 Winner!';
        isDrawing = false;
        document.getElementById('reset-btn').style.display = '';
        launchConfetti();
        return;
      }
      elapsed += interval;
      setTimeout(step, interval);
    }
    step();
  }

  function resetDraw() {
    document.getElementById('ticker-name').className   = 'ticker-name';
    document.getElementById('ticker-name').textContent = '—';
    document.getElementById('ticker-label').textContent = 'Ready to draw';
    document.getElementById('draw-btn').disabled = false;
    document.getElementById('reset-btn').style.display = 'none';
  }

  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.style.display = 'block';
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#FF0033','#ff6b6b','#ffd43b','#69db7c','#4dabf7','#fff','#cc5de8'];
    const pieces = Array.from({length: 180}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: 6 + Math.random() * 9,
      h: 10 + Math.random() * 14,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      vx: (Math.random() - 0.5) * 3.5,
      vy: 2.5 + Math.random() * 4.5,
      vr: (Math.random() - 0.5) * 7,
      opacity: 1
    }));
    let frame = 0;
    (function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        if (frame > 80) p.opacity -= 0.009;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x + p.w/2, p.y + p.h/2);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      frame++;
      if (frame < 230) requestAnimationFrame(draw);
      else { canvas.style.display = 'none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
    })();
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = 'status-bar' + (type ? ' ' + type : '');
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('video-id').addEventListener('keydown', e => { if(e.key==='Enter') connectLive(); });
</script>
</body>
</html>
